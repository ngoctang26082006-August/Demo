<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style1.css"></title>
    
<style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
            background: #f1f5f9;
        }

        .container{
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        h1{
            margin-bottom: 15px;
            color: #333;
        }

        p{
            margin-bottom: 25px;
            color: #666;
        }

        .buttons{
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button{
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        button:hover{
            transform: scale(1.05);
        }

        #redBtn{
            background: #ef4444;
        }

        #blueBtn{
            background: #3b82f6;
        }

        #greenBtn{
            background: #22c55e;
        }

        #resetBtn{
            background: #64748b;
        }

        .color-name{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>ĐỔI MÀU NỀN BẰNG DOM</h1>

        <p>Nhấn vào nút để thay đổi màu nền trang web</p>

        <div class="buttons">
            <button id="redBtn">Màu Đỏ</button>
            <button id="blueBtn">Màu Xanh</button>
            <button id="greenBtn">Màu Lá</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="color-name" id="colorText">
            Màu hiện tại: Mặc định
        </div>

    </div>

<script>

    // Lấy phần tử
    const redBtn = document.getElementById("redBtn");
    const blueBtn = document.getElementById("blueBtn");
    const greenBtn = document.getElementById("greenBtn");
    const resetBtn = document.getElementById("resetBtn");
    const colorText = document.getElementById("colorText");

    // Đổi màu đỏ
    redBtn.addEventListener("click", function(){

        document.body.style.backgroundColor = "#ef4444";

        colorText.innerHTML = "Màu hiện tại: Đỏ";

    });

    // Đổi màu xanh dương
    blueBtn.addEventListener("click", function(){

        document.body.style.backgroundColor = "#3b82f6";

        colorText.innerHTML = "Màu hiện tại: Xanh Dương";

    });

    // Đổi màu xanh lá
    greenBtn.addEventListener("click", function(){

        document.body.style.backgroundColor = "#22c55e";

        colorText.innerHTML = "Màu hiện tại: Xanh Lá";

    });

    // Reset màu nền
    resetBtn.addEventListener("click", function(){

        document.body.style.backgroundColor = "#f1f5f9";

        colorText.innerHTML = "Màu hiện tại: Mặc định";

    });

</script>

</body>
</html>
